<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 150">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)"/>

  <!-- Network connections -->
  <g stroke="#30363d" stroke-width="1" fill="none">
    <!-- Center to sides -->
    <line x1="400" y1="75" x2="150" y2="50"/>
    <line x1="400" y1="75" x2="650" y2="50"/>
    <line x1="400" y1="75" x2="150" y2="100"/>
    <line x1="400" y1="75" x2="650" y2="100"/>
    <line x1="400" y1="75" x2="400" y2="30"/>
    <line x1="400" y1="75" x2="400" y2="120"/>
    <!-- Outer connections -->
    <line x1="150" y1="50" x2="150" y2="100"/>
    <line x1="650" y1="50" x2="650" y2="100"/>
    <line x1="150" y1="50" x2="400" y2="30"/>
    <line x1="650" y1="50" x2="400" y2="30"/>
    <line x1="150" y1="100" x2="400" y2="120"/>
    <line x1="650" y1="100" x2="400" y2="120"/>
  </g>

  <!-- Animated pulses on connections -->
  <g stroke="#58a6ff" stroke-width="1.5" fill="none" opacity="0.5">
    <line x1="400" y1="75" x2="150" y2="50">
      <animate attributeName="stroke-dasharray" values="0,300;300,0" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="75" x2="650" y2="50">
      <animate attributeName="stroke-dasharray" values="0,300;300,0" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    </line>
    <line x1="400" y1="75" x2="150" y2="100">
      <animate attributeName="stroke-dasharray" values="0,300;300,0" dur="2s" repeatCount="indefinite" begin="1s"/>
    </line>
    <line x1="400" y1="75" x2="650" y2="100">
      <animate attributeName="stroke-dasharray" values="0,300;300,0" dur="2s" repeatCount="indefinite" begin="1.5s"/>
    </line>
    <line x1="400" y1="75" x2="400" y2="30">
      <animate attributeName="stroke-dasharray" values="0,50;50,0" dur="1.5s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="75" x2="400" y2="120">
      <animate attributeName="stroke-dasharray" values="0,50;50,0" dur="1.5s" repeatCount="indefinite" begin="0.7s"/>
    </line>
  </g>

  <!-- Data packets -->
  <g filter="url(#glow)">
    <circle r="3" fill="#58a6ff">
      <animateMotion path="M400,75 L150,50" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle r="3" fill="#79c0ff">
      <animateMotion path="M400,75 L650,50" dur="3s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle r="3" fill="#58a6ff">
      <animateMotion path="M400,75 L150,100" dur="3s" repeatCount="indefinite" begin="2s"/>
    </circle>
    <circle r="3" fill="#79c0ff">
      <animateMotion path="M400,75 L650,100" dur="3s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
  </g>

  <!-- Center node -->
  <g filter="url(#glow)">
    <circle cx="400" cy="75" r="20" fill="#161b22" stroke="#58a6ff" stroke-width="2">
      <animate attributeName="r" values="20;22;20" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="stroke-width" values="2;3;2" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="400" y="70" text-anchor="middle" fill="#c9d1d9" font-size="8" font-family="monospace">CONNECT</text>
    <text x="400" y="82" text-anchor="middle" fill="#58a6ff" font-size="6" font-family="monospace">WITH ME</text>
  </g>

  <!-- Left nodes -->
  <!-- LinkedIn -->
  <g filter="url(#glow)" transform="translate(150, 50)">
    <circle r="15" fill="#161b22" stroke="#0A66C2" stroke-width="1.5">
      <animate attributeName="r" values="15;17;15" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="4" text-anchor="middle" fill="#0A66C2" font-size="8" font-family="monospace">LinkedIn</text>
  </g>

  <!-- GitHub -->
  <g filter="url(#glow)" transform="translate(150, 100)">
    <circle r="15" fill="#161b22" stroke="#c9d1d9" stroke-width="1.5">
      <animate attributeName="r" values="15;17;15" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <text x="0" y="4" text-anchor="middle" fill="#c9d1d9" font-size="8" font-family="monospace">GitHub</text>
  </g>

  <!-- Right nodes -->
  <!-- Email -->
  <g filter="url(#glow)" transform="translate(650, 50)">
    <circle r="15" fill="#161b22" stroke="#EA4335" stroke-width="1.5">
      <animate attributeName="r" values="15;17;15" dur="2s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <text x="0" y="4" text-anchor="middle" fill="#EA4335" font-size="8" font-family="monospace">Email</text>
  </g>

  <!-- Portfolio -->
  <g filter="url(#glow)" transform="translate(650, 100)">
    <circle r="15" fill="#161b22" stroke="#79c0ff" stroke-width="1.5">
      <animate attributeName="r" values="15;17;15" dur="2s" repeatCount="indefinite" begin="1.5s"/>
    </circle>
    <text x="0" y="4" text-anchor="middle" fill="#79c0ff" font-size="8" font-family="monospace">Portfolio</text>
  </g>

  <!-- Top node -->
  <g filter="url(#glow)" transform="translate(400, 30)">
    <circle r="12" fill="#161b22" stroke="#1f6feb" stroke-width="1.5">
      <animate attributeName="r" values="12;14;12" dur="2s" repeatCount="indefinite" begin="0.3s"/>
    </circle>
    <text x="0" y="3" text-anchor="middle" fill="#1f6feb" font-size="6" font-family="monospace">Research</text>
  </g>

  <!-- Bottom node -->
  <g filter="url(#glow)" transform="translate(400, 120)">
    <circle r="12" fill="#161b22" stroke="#58a6ff" stroke-width="1.5">
      <animate attributeName="r" values="12;14;12" dur="2s" repeatCount="indefinite" begin="0.8s"/>
    </circle>
    <text x="0" y="3" text-anchor="middle" fill="#58a6ff" font-size="6" font-family="monospace">Kaggle</text>
  </g>

  <!-- Floating particles -->
  <g fill="#58a6ff">
    <circle cx="80" cy="30" r="1" opacity="0.4">
      <animate attributeName="cy" values="30;25;30" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="720" cy="35" r="1.5" opacity="0.4">
      <animate attributeName="cy" values="35;30;35" dur="4s" repeatCount="indefinite" begin="1s"/>
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="4s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle cx="100" cy="120" r="1" opacity="0.4">
      <animate attributeName="cy" values="120;125;120" dur="5s" repeatCount="indefinite" begin="2s"/>
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="5s" repeatCount="indefinite" begin="2s"/>
    </circle>
    <circle cx="700" cy="115" r="1" opacity="0.4">
      <animate attributeName="cy" values="115;110;115" dur="4.5s" repeatCount="indefinite" begin="0.5s"/>
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="4.5s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
  </g>

  <!-- Quote -->
  <text x="400" y="145" text-anchor="middle" fill="#8b949e" font-size="10" font-family="monospace" font-style="italic">"Building systems that perceive, decide, and act."</text>
</svg>