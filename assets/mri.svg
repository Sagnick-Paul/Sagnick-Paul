<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>

    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#58a6ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="brainClip">
      <ellipse cx="200" cy="100" rx="70" ry="55"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)"/>

  <!-- MRI Scanner Frame -->
  <g>
    <!-- Outer ring -->
    <ellipse cx="200" cy="100" rx="90" ry="70" fill="none" stroke="#30363d" stroke-width="4"/>
    <ellipse cx="200" cy="100" rx="85" ry="65" fill="none" stroke="#58a6ff" stroke-width="1" opacity="0.5"/>

    <!-- Scanner bed -->
    <rect x="100" y="155" width="200" height="15" rx="3" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <rect x="110" y="158" width="180" height="8" rx="2" fill="#0d1117"/>
  </g>

  <!-- Brain scan area -->
  <g clip-path="url(#brainClip)">
    <!-- Brain background -->
    <ellipse cx="200" cy="100" rx="70" ry="55" fill="#0d1117"/>

    <!-- Brain structure - stylized -->
    <g fill="#1f6feb" opacity="0.3">
      <!-- Left hemisphere -->
      <path d="M150,100 Q140,70 170,50 Q200,40 200,50 Q200,40 230,50 Q260,70 250,100 Q260,130 230,150 Q200,160 200,150 Q200,160 170,150 Q140,130 150,100" opacity="0.2"/>
    </g>

    <!-- Brain folds pattern -->
    <g stroke="#30363d" stroke-width="1" fill="none" opacity="0.4">
      <path d="M160,80 Q180,70 200,80 Q220,90 220,110 Q220,130 200,130 Q180,130 160,110 Q160,90 160,80"/>
      <path d="M170,70 Q185,60 200,70 Q215,80 215,90"/>
      <path d="M185,130 Q200,140 215,130 Q225,120 215,110"/>
    </g>

    <!-- Tumor region -->
    <ellipse cx="225" cy="85" rx="15" ry="12" fill="#ff6b6b" opacity="0.4" filter="url(#glow)">
      <animate attributeName="opacity" values="0.3;0.5;0.3" dur="2s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Segmentation overlay -->
    <ellipse cx="225" cy="85" rx="18" ry="15" fill="none" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="4,2" filter="url(#glow)">
      <animate attributeName="stroke-dashoffset" values="0;12" dur="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Scan line animation -->
  <g>
    <line x1="130" y1="45" x2="270" y2="45" stroke="url(#scanGrad)" stroke-width="3" filter="url(#glow)">
      <animate attributeName="y1" values="45;155;45" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="45;155;45" dur="3s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Scanner indicators -->
  <g fill="#161b22" stroke="#30363d" stroke-width="1">
    <!-- Left indicator panel -->
    <rect x="30" y="60" width="50" height="80" rx="3"/>
    <text x="55" y="75" text-anchor="middle" fill="#8b949e" font-size="8" font-family="monospace">SCAN</text>
    <!-- Status LEDs -->
    <circle cx="45" cy="90" r="4" fill="#6bcb77">
      <animate attributeName="opacity" values="1;0.5;1" dur="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="65" cy="90" r="4" fill="#58a6ff">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="45" cy="110" r="4" fill="#8b949e"/>
    <circle cx="65" cy="110" r="4" fill="#8b949e"/>
    <circle cx="45" cy="130" r="4" fill="#8b949e"/>
    <circle cx="65" cy="130" r="4" fill="#8b949e"/>
  </g>

  <!-- Right indicator panel -->
  <g fill="#161b22" stroke="#30363d" stroke-width="1">
    <rect x="320" y="60" width="50" height="80" rx="3"/>
    <text x="345" y="75" text-anchor="middle" fill="#8b949e" font-size="8" font-family="monospace">SEG</text>
    <!-- Progress bars -->
    <rect x="328" y="85" width="34" height="6" rx="1" fill="#0d1117"/>
    <rect x="328" y="85" width="25" height="6" rx="1" fill="#58a6ff">
      <animate attributeName="width" values="10;34;10" dur="3s" repeatCount="indefinite"/>
    </rect>
    <rect x="328" y="100" width="34" height="6" rx="1" fill="#0d1117"/>
    <rect x="328" y="100" width="20" height="6" rx="1" fill="#79c0ff">
      <animate attributeName="width" values="5;30;5" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="328" y="115" width="34" height="6" rx="1" fill="#0d1117"/>
    <rect x="328" y="115" width="28" height="6" rx="1" fill="#1f6feb">
      <animate attributeName="width" values="8;34;8" dur="2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Decorative elements -->
  <g fill="#58a6ff" opacity="0.3">
    <circle cx="50" cy="170" r="2">
      <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="175" r="2">
      <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" begin="1s"/>
    </circle>
  </g>

  <!-- Grid overlay -->
  <g stroke="#30363d" stroke-width="0.5" opacity="0.2">
    <line x1="130" y1="45" x2="130" y2="155"/>
    <line x1="165" y1="45" x2="165" y2="155"/>
    <line x1="200" y1="45" x2="200" y2="155"/>
    <line x1="235" y1="45" x2="235" y2="155"/>
    <line x1="270" y1="45" x2="270" y2="155"/>
  </g>
</svg>