<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Gradient for background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>

    <!-- Glow effect for nodes -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Pulse animation for nodes -->
    <filter id="pulseGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Gradient for traces -->
    <linearGradient id="traceGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#58a6ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0.1"/>
    </linearGradient>

    <linearGradient id="traceGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#79c0ff" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#79c0ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#79c0ff" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)"/>

  <!-- Circuit traces - Horizontal lines -->
  <g stroke="#30363d" stroke-width="1" fill="none">
    <!-- Top section -->
    <path d="M0 40 L150 40 L180 70 L300 70 L330 40 L450 40 L480 70 L600 70 L630 40 L750 40 L780 70 L900 70 L930 40 L1050 40 L1080 70 L1200 70"/>
    <path d="M0 80 L100 80 L130 110 L250 110 L280 80 L400 80 L430 110 L550 110 L580 80 L700 80 L730 110 L850 110 L880 80 L1000 80 L1030 110 L1200 110"/>
    <path d="M0 120 L80 120 L110 150 L230 150 L260 120 L380 120 L410 150 L530 150 L560 120 L680 120 L710 150 L830 150 L860 120 L980 120 L1010 150 L1200 150"/>

    <!-- Middle section -->
    <path d="M0 200 L80 200 L110 170 L230 170 L260 200 L380 200 L410 170 L530 170 L560 200 L680 200 L710 170 L830 170 L860 200 L980 200 L1010 170 L1200 170"/>
    <path d="M0 240 L100 240 L130 210 L250 210 L280 240 L400 240 L430 210 L550 210 L580 240 L700 240 L730 210 L850 210 L880 240 L1000 240 L1030 210 L1200 210"/>
    <path d="M0 280 L150 280 L180 250 L300 250 L330 280 L450 280 L480 250 L600 250 L630 280 L750 280 L780 250 L900 250 L930 280 L1050 280 L1080 250 L1200 250"/>
  </g>

  <!-- Animated pulse traces -->
  <g stroke="url(#traceGrad)" stroke-width="2" fill="none" stroke-linecap="round">
    <!-- Pulse 1 -->
    <path d="M0 40 L150 40 L180 70 L300 70 L330 40 L450 40 L480 70 L600 70">
      <animate attributeName="stroke-dasharray" values="0,1200;1200,0" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite"/>
    </path>
    <path d="M630 40 L750 40 L780 70 L900 70 L930 40 L1050 40 L1080 70 L1200 70">
      <animate attributeName="stroke-dasharray" values="0,1200;1200,0" dur="4s" repeatCount="indefinite" begin="0.5s"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite" begin="0.5s"/>
    </path>

    <!-- Pulse 2 - vertical -->
    <path d="M180 70 L180 150" stroke="url(#traceGrad2)" stroke-width="2">
      <animate attributeName="stroke-dasharray" values="0,100;100,0" dur="3s" repeatCount="indefinite" begin="1s"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="3s" repeatCount="indefinite" begin="1s"/>
    </path>
    <path d="M480 70 L480 150" stroke="url(#traceGrad2)" stroke-width="2">
      <animate attributeName="stroke-dasharray" values="0,100;100,0" dur="3s" repeatCount="indefinite" begin="1.5s"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="3s" repeatCount="indefinite" begin="1.5s"/>
    </path>
    <path d="M780 70 L780 150" stroke="url(#traceGrad2)" stroke-width="2">
      <animate attributeName="stroke-dasharray" values="0,100;100,0" dur="3s" repeatCount="indefinite" begin="2s"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="3s" repeatCount="indefinite" begin="2s"/>
    </path>
    <path d="M1080 70 L1080 150" stroke="url(#traceGrad2)" stroke-width="2">
      <animate attributeName="stroke-dasharray" values="0,100;100,0" dur="3s" repeatCount="indefinite" begin="2.5s"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="3s" repeatCount="indefinite" begin="2.5s"/>
    </path>

    <!-- Bottom section pulses -->
    <path d="M0 280 L150 280 L180 250 L300 250 L330 280 L450 280 L480 250 L600 250">
      <animate attributeName="stroke-dasharray" values="0,1200;1200,0" dur="4s" repeatCount="indefinite" begin="1s"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite" begin="1s"/>
    </path>
    <path d="M630 280 L750 280 L780 250 L900 250 L930 280 L1050 280 L1080 250 L1200 250">
      <animate attributeName="stroke-dasharray" values="0,1200;1200,0" dur="4s" repeatCount="indefinite" begin="1.5s"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite" begin="1.5s"/>
    </path>
  </g>

  <!-- Circuit nodes with glow -->
  <g fill="#58a6ff" filter="url(#glow)">
    <!-- Top row nodes -->
    <circle cx="150" cy="40" r="4">
      <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="70" r="4">
      <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite" begin="0.3s"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite" begin="0.3s"/>
    </circle>
    <circle cx="450" cy="40" r="4">
      <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite" begin="0.6s"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite" begin="0.6s"/>
    </circle>
    <circle cx="600" cy="70" r="4">
      <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite" begin="0.9s"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite" begin="0.9s"/>
    </circle>
    <circle cx="750" cy="40" r="4">
      <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite" begin="1.2s"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite" begin="1.2s"/>
    </circle>
    <circle cx="900" cy="70" r="4">
      <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite" begin="1.5s"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite" begin="1.5s"/>
    </circle>
    <circle cx="1050" cy="40" r="4">
      <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite" begin="1.8s"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite" begin="1.8s"/>
    </circle>

    <!-- Center nodes -->
    <circle cx="180" cy="160" r="6" fill="#79c0ff">
      <animate attributeName="r" values="6;8;6" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;1;0.7" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="480" cy="160" r="6" fill="#79c0ff">
      <animate attributeName="r" values="6;8;6" dur="1.5s" repeatCount="indefinite" begin="0.2s"/>
      <animate attributeName="opacity" values="0.7;1;0.7" dur="1.5s" repeatCount="indefinite" begin="0.2s"/>
    </circle>
    <circle cx="780" cy="160" r="6" fill="#79c0ff">
      <animate attributeName="r" values="6;8;6" dur="1.5s" repeatCount="indefinite" begin="0.4s"/>
      <animate attributeName="opacity" values="0.7;1;0.7" dur="1.5s" repeatCount="indefinite" begin="0.4s"/>
    </circle>
    <circle cx="1080" cy="160" r="6" fill="#79c0ff">
      <animate attributeName="r" values="6;8;6" dur="1.5s" repeatCount="indefinite" begin="0.6s"/>
      <animate attributeName="opacity" values="0.7;1;0.7" dur="1.5s" repeatCount="indefinite" begin="0.6s"/>
    </circle>

    <!-- Bottom row nodes -->
    <circle cx="150" cy="280" r="4">
      <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite" begin="2s"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite" begin="2s"/>
    </circle>
    <circle cx="300" cy="250" r="4">
      <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite" begin="2.3s"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite" begin="2.3s"/>
    </circle>
    <circle cx="450" cy="280" r="4">
      <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite" begin="2.6s"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite" begin="2.6s"/>
    </circle>
    <circle cx="600" cy="250" r="4">
      <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite" begin="2.9s"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite" begin="2.9s"/>
    </circle>
    <circle cx="750" cy="280" r="4">
      <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite" begin="3.2s"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite" begin="3.2s"/>
    </circle>
    <circle cx="900" cy="250" r="4">
      <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite" begin="3.5s"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite" begin="3.5s"/>
    </circle>
    <circle cx="1050" cy="280" r="4">
      <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite" begin="3.8s"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite" begin="3.8s"/>
    </circle>
  </g>

  <!-- Data packets flowing -->
  <g filter="url(#pulseGlow)">
    <circle r="3" fill="#58a6ff">
      <animateMotion path="M0 40 L150 40 L180 70 L300 70 L330 40 L450 40 L480 70 L600 70 L630 40 L750 40 L780 70 L900 70 L930 40 L1050 40 L1080 70 L1200 70" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle r="3" fill="#79c0ff">
      <animateMotion path="M0 280 L150 280 L180 250 L300 250 L330 280 L450 280 L480 250 L600 250 L630 280 L750 280 L780 250 L900 250 L930 280 L1050 280 L1080 250 L1200 250" dur="6s" repeatCount="indefinite" begin="3s"/>
    </circle>
  </g>

  <!-- Subtle grid overlay -->
  <g stroke="#30363d" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="200" y1="0" x2="200" y2="320"/>
    <line x1="400" y1="0" x2="400" y2="320"/>
    <line x1="600" y1="0" x2="600" y2="320"/>
    <line x1="800" y1="0" x2="800" y2="320"/>
    <line x1="1000" y1="0" x2="1000" y2="320"/>
  </g>
</svg>