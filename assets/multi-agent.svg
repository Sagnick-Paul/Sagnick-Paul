<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>

    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)"/>

  <!-- Connection lines between agents -->
  <g stroke="#30363d" stroke-width="1" fill="none">
    <!-- Center to outer connections -->
    <line x1="200" y1="100" x2="80" y2="60"/>
    <line x1="200" y1="100" x2="320" y2="60"/>
    <line x1="200" y1="100" x2="80" y2="140"/>
    <line x1="200" y1="100" x2="320" y2="140"/>
    <line x1="200" y1="100" x2="200" y2="40"/>
    <line x1="200" y1="100" x2="200" y2="170"/>
    <!-- Outer connections -->
    <line x1="80" y1="60" x2="200" y2="40"/>
    <line x1="320" y1="60" x2="200" y2="40"/>
    <line x1="80" y1="60" x2="80" y2="140"/>
    <line x1="320" y1="60" x2="320" y2="140"/>
  </g>

  <!-- Animated data packets on connections -->
  <g>
    <!-- Packet 1: Center to top-left -->
    <circle r="3" fill="#58a6ff" filter="url(#glow)">
      <animateMotion path="M200,100 L80,60" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- Packet 2: Center to top-right -->
    <circle r="3" fill="#79c0ff" filter="url(#glow)">
      <animateMotion path="M200,100 L320,60" dur="2s" repeatCount="indefinite" begin="0.3s"/>
    </circle>
    <!-- Packet 3: Center to bottom-left -->
    <circle r="3" fill="#58a6ff" filter="url(#glow)">
      <animateMotion path="M200,100 L80,140" dur="2s" repeatCount="indefinite" begin="0.6s"/>
    </circle>
    <!-- Packet 4: Center to bottom-right -->
    <circle r="3" fill="#79c0ff" filter="url(#glow)">
      <animateMotion path="M200,100 L320,140" dur="2s" repeatCount="indefinite" begin="0.9s"/>
    </circle>
    <!-- Packet 5: Center to top -->
    <circle r="3" fill="#58a6ff" filter="url(#glow)">
      <animateMotion path="M200,100 L200,40" dur="1.5s" repeatCount="indefinite" begin="0.2s"/>
    </circle>
    <!-- Packet 6: Center to bottom -->
    <circle r="3" fill="#79c0ff" filter="url(#glow)">
      <animateMotion path="M200,100 L200,170" dur="1.5s" repeatCount="indefinite" begin="0.7s"/>
    </circle>
  </g>

  <!-- Pulsing connection lines -->
  <g stroke="#58a6ff" stroke-width="1.5" fill="none" opacity="0.4">
    <path d="M200,100 L80,60" stroke-dasharray="4,4">
      <animate attributeName="stroke-dashoffset" values="0;16" dur="1s" repeatCount="indefinite"/>
    </path>
    <path d="M200,100 L320,60" stroke-dasharray="4,4">
      <animate attributeName="stroke-dashoffset" values="0;16" dur="1s" repeatCount="indefinite"/>
    </path>
    <path d="M200,100 L80,140" stroke-dasharray="4,4">
      <animate attributeName="stroke-dashoffset" values="0;16" dur="1s" repeatCount="indefinite"/>
    </path>
    <path d="M200,100 L320,140" stroke-dasharray="4,4">
      <animate attributeName="stroke-dashoffset" values="0;16" dur="1s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Central AI node -->
  <g filter="url(#glow)">
    <circle cx="200" cy="100" r="25" fill="#161b22" stroke="#58a6ff" stroke-width="2">
      <animate attributeName="r" values="25;27;25" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="stroke-width" values="2;3;2" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="100" r="18" fill="#1f6feb"/>
    <!-- Brain/neural icon -->
    <g fill="#58a6ff">
      <circle cx="192" cy="95" r="3"/>
      <circle cx="208" cy="95" r="3"/>
      <circle cx="200" cy="105" r="3"/>
      <line x1="192" y1="95" x2="200" y2="105" stroke="#79c0ff" stroke-width="1.5"/>
      <line x1="208" y1="95" x2="200" y2="105" stroke="#79c0ff" stroke-width="1.5"/>
    </g>
    <!-- Pulsing rings -->
    <circle cx="200" cy="100" r="35" fill="none" stroke="#58a6ff" stroke-width="1" opacity="0">
      <animate attributeName="r" values="25;45" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Outer agent nodes -->
  <!-- Top -->
  <g filter="url(#glow)">
    <circle cx="200" cy="40" r="15" fill="#161b22" stroke="#79c0ff" stroke-width="1.5">
      <animate attributeName="r" values="15;17;15" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <text x="200" y="44" text-anchor="middle" fill="#79c0ff" font-size="10" font-family="monospace">AGENT</text>
  </g>

  <!-- Top-left -->
  <g filter="url(#glow)">
    <circle cx="80" cy="60" r="15" fill="#161b22" stroke="#79c0ff" stroke-width="1.5">
      <animate attributeName="r" values="15;17;15" dur="2s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <text x="80" y="64" text-anchor="middle" fill="#79c0ff" font-size="10" font-family="monospace">AGENT</text>
  </g>

  <!-- Top-right -->
  <g filter="url(#glow)">
    <circle cx="320" cy="60" r="15" fill="#161b22" stroke="#79c0ff" stroke-width="1.5">
      <animate attributeName="r" values="15;17;15" dur="2s" repeatCount="indefinite" begin="1.5s"/>
    </circle>
    <text x="320" y="64" text-anchor="middle" fill="#79c0ff" font-size="10" font-family="monospace">AGENT</text>
  </g>

  <!-- Bottom-left -->
  <g filter="url(#glow)">
    <circle cx="80" cy="140" r="15" fill="#161b22" stroke="#79c0ff" stroke-width="1.5">
      <animate attributeName="r" values="15;17;15" dur="2s" repeatCount="indefinite" begin="2s"/>
    </circle>
    <text x="80" y="144" text-anchor="middle" fill="#79c0ff" font-size="10" font-family="monospace">AGENT</text>
  </g>

  <!-- Bottom-right -->
  <g filter="url(#glow)">
    <circle cx="320" cy="140" r="15" fill="#161b22" stroke="#79c0ff" stroke-width="1.5">
      <animate attributeName="r" values="15;17;15" dur="2s" repeatCount="indefinite" begin="2.5s"/>
    </circle>
    <text x="320" y="144" text-anchor="middle" fill="#79c0ff" font-size="10" font-family="monospace">AGENT</text>
  </g>

  <!-- Bottom -->
  <g filter="url(#glow)">
    <circle cx="200" cy="170" r="15" fill="#161b22" stroke="#79c0ff" stroke-width="1.5">
      <animate attributeName="r" values="15;17;15" dur="2s" repeatCount="indefinite" begin="3s"/>
    </circle>
    <text x="200" y="174" text-anchor="middle" fill="#79c0ff" font-size="10" font-family="monospace">AGENT</text>
  </g>

  <!-- Floating particles -->
  <g fill="#58a6ff" opacity="0.4">
    <circle cx="50" cy="30" r="1.5">
      <animate attributeName="cy" values="30;25;30" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="35" r="1.5">
      <animate attributeName="cy" values="35;30;35" dur="3s" repeatCount="indefinite" begin="1s"/>
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle cx="30" cy="150" r="1">
      <animate attributeName="cy" values="150;155;150" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="370" cy="155" r="1">
      <animate attributeName="cy" values="155;150;155" dur="4s" repeatCount="indefinite" begin="1.5s"/>
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="4s" repeatCount="indefinite" begin="1.5s"/>
    </circle>
  </g>
</svg>